<style>
  @font-face{font-family:"Fraunces";src:url("fonts/fraunces-v38-latin-regular.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:"Fraunces";src:url("fonts/fraunces-v38-latin-italic.woff2") format("woff2");font-weight:400;font-style:italic;font-display:swap;}
  @font-face{font-family:"Fraunces";src:url("fonts/fraunces-v38-latin-700.woff2") format("woff2");font-weight:700;font-style:normal;font-display:swap;}
  @font-face{font-family:"Fraunces";src:url("fonts/fraunces-v38-latin-700italic.woff2") format("woff2");font-weight:700;font-style:italic;font-display:swap;}
  @font-face{font-family:"Karla";src:url("fonts/karla-v33-latin-regular.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:"Karla";src:url("fonts/karla-v33-latin-700.woff2") format("woff2");font-weight:700;font-style:normal;font-display:swap;}

  :root{
    --choc:#2E2018; --choc-2:#241912;
    --cream:#F0DED6; --cream-2:#FFF7F0;
    --rasp:#D85273; --rasp-dark:#C24462;
    --gold:#CE8E47;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    min-height:100svh;
    background:var(--choc);
    font-family:"Karla",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:22px 16px 40px;
  }
  .card{
    width:100%; max-width:410px;
    border:2px solid var(--rasp);
    border-radius:26px;
    padding:34px 26px 0;
    position:relative;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(206,142,71,.10), rgba(0,0,0,0) 60%),
      var(--choc);
    overflow:hidden;
  }
  .logo{ display:block; width:min(250px,72%); height:auto; margin:4px auto 22px; }
  .name{ text-align:center; font-weight:700; font-size:24px; letter-spacing:.04em; color:var(--cream); }
  .role{ text-align:center; font-family:"Fraunces",serif; font-style:italic; font-weight:700;
         font-size:19px; color:var(--rasp); margin-top:6px; }
  .rule{ width:170px; height:2px; margin:20px auto;
         background:linear-gradient(90deg, rgba(216,82,115,0), var(--rasp), rgba(216,82,115,0)); }

  /* primary action */
  .save{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:16px 18px;
    background:var(--rasp); color:#fff;
    border:0; border-radius:14px;
    font-family:"Karla"; font-weight:700; font-size:17px; letter-spacing:.02em;
    text-decoration:none; cursor:pointer;
    transition:background .15s ease, transform .06s ease;
  }
  .save:hover{ background:var(--rasp-dark); }
  .save:active{ transform:translateY(1px); }
  .save svg{ flex:0 0 auto; }

  /* secondary actions */
  .actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .act{
    display:flex; align-items:center; gap:10px;
    min-width:0;
    padding:13px 14px;
    background:rgba(240,222,214,.06);
    border:1px solid rgba(240,222,214,.22);
    border-radius:13px;
    color:var(--cream); text-decoration:none;
    font-weight:700; font-size:14.5px;
    transition:background .15s ease, border-color .15s ease;
  }
  .act:hover{ background:rgba(240,222,214,.12); border-color:rgba(240,222,214,.4); }
  .act .ic{
    width:34px; height:34px; flex:0 0 34px;
    background:var(--rasp); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .act .ic svg{ width:17px; height:17px; }
  .act .lines{ display:flex; flex-direction:column; min-width:0; flex:1; }
  .act .k{ font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; }
  .act .v{ font-size:13.5px; color:var(--cream); font-weight:700; overflow-wrap:anywhere; }

  .tag{ text-align:center; font-family:"Fraunces",serif; font-style:italic; font-weight:700;
        font-size:16px; line-height:1.5; color:var(--gold); margin:24px 0 4px; }
  .owner{ text-align:center; font-size:12px; color:rgba(240,222,214,.55); margin-top:10px; }

  /* scalloped foot, full width, echoing the print card */
  .scallop{ display:block; width:calc(100% + 52px); height:26px; margin:20px -26px 0; }

  @media (max-width:360px){ .actions{ grid-template-columns:1fr; } }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; } }
</style>
